<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact us!</title>
    <link rel="icon" type="image/x-icon" href="images/logoTab.png">
    <link rel="stylesheet" type="text/css" href="style.css">
    <link rel="stylesheet" type="text/css" href="clock/digitalClock.css">
    <script src="clock/digitalClock.js" defer></script>
    <script src="loader.js" defer></script>
    <link rel="stylesheet" type="text/css" href="loader.css">
</head>
<body>
    <header class="navbar">
        <div class="headerlogo"><a href="home.html"><img src="images/logo.png" style="width:50px"></a></div> 
        <div class="headerlinks">
            <nav class="navlinks">
                <a href="products.html">Our products</a>
                <a href="about.html">About us</a>
                <a href="team.html" id="team">Our team</a>
                <a href="find-us.html">Find us</a>
                <a href="#">Contact us</a>
            </nav>
        </div>
        <div id="clocks">
            <div id="clock" class="clock">
                <div id="hours-tens"></div>
                <div id="hours-units"></div>
                <div id="colon" class="colon">:</div>
                <div id="minutes-tens"></div>
                <div id="minutes-units"></div>
                <div id="colon" class="colon">:</div>
                <div id="seconds-tens"></div>
                <div id="seconds-units"></div>
            </div>
            <div id="timer" class="timer">
                <div id="timer-hours-tens"></div>
                <div id="timer-hours-units"></div>
                <div id="timer-colon" class="colon">:</div>
                <div id="timer-minutes-tens"></div>
                <div id="timer-minutes-units"></div>
                <div id="timer-colon" class="colon">:</div>
                <div id="timer-seconds-tens"></div>
                <div id="timer-seconds-units"></div>
            </div>
        </div>
    </header>
    <br><br><br>
    <h1>Contact Condo Start' right bellow !</h1>
    <br>
    <form class="contact-form">
        <label for:"infos">Your informations:</label>
        <div>
        <input type="text" id="name" name="name" required placeholder="Name">

        <input type="email" id="email" name="email" required placeholder="Email">
        </div>
        <br>
        <label for="message">Message:</label>
        <textarea id="message" name="message" rows="5" required placeholder="Between 20 and 2000"></textarea>

        <br>
        <button>Send</button>
    </form>

    <footer class="footer" id="contact">
        <div class="footer-content">
            <h3>Contact us</h3>

            <div class="footer-links">
                <a href=https://maps.app.goo.gl/sPVi7EShKMnsA4T69 target="_blank">📍Our school</a>
                <a href="sms:+33695447577">📞 Call us</a>
                <a href="https://www.instagram.com/isenbrest/">🔗 Instagram</a>
            </div>

            <p class="copyright">© 2026 - The CondomStart' team | Home page</p>
        </div>
    </footer>
</body>
</html>
